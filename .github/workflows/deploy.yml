name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USER }}/github-actions-demo:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USER }}/github-actions-demo:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/github-actions-demo:latest
            docker stop myapp || true
            docker rm myapp || true
            docker run -d --name myapp -p 8082:3000 ${{ secrets.DOCKER_USER }}/github-actions-demo:latest
St